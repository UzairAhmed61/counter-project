name: Counter Runner

on:
  schedule:
    - cron: "*/5 * * * *"   # Har 5 minute
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run counter script
        run: python counter.py

      - name: Show updated count
        run: cat count.txt
